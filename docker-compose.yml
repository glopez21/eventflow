services:
  postgres:
    image: postgres:16-alpine
    container_name: eventflow-db
    environment:
      POSTGRES_USER: eventflow
      POSTGRES_PASSWORD: eventflow_secret
      POSTGRES_DB: eventflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eventflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: eventflow-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://eventflow:eventflow_secret@postgres:5432/eventflow
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: